version: '3.8'

services:
  db:
    image: postgres:15
    container_name: odoo17_db
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo_secure_pass_2024
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ./postgresql:/var/lib/postgresql/data/pgdata
    restart: always
    networks:
      - odoo_network

  odoo:
    image: odoo:17.0
    container_name: odoo17_app
    depends_on:
      - db
    ports:
      - "8069:8069"
      - "8072:8072"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo_secure_pass_2024
    volumes:
      - ./addons:/mnt/extra-addons
      - ./config:/etc/odoo
      - ./data:/var/lib/odoo
    restart: always
    networks:
      - odoo_network

  nginx:
    image: nginx:alpine
    container_name: odoo17_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - odoo
    restart: always
    networks:
      - odoo_network

networks:
  odoo_network:
    driver: bridge
