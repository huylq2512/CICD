name: Deploy Odoo 17

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Send deployment start notification
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          🚀 Odoo 17 Deployment Started
          
          📦 Repository: ${{ github.repository }}
          👤 Author: ${{ github.actor }}
          📝 Commit: ${{ github.event.head_commit.message }}
          🌿 Branch: ${{ github.ref_name }}
          
          ⏳ Deploying...

    - name: Deploy to VPS
      id: deploy
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /opt/odoo17
          
          # 1. BACKUP DATABASE
          echo "📦 Creating database backup..."
          BACKUP_FILE="backup/backup_$(date +%Y%m%d_%H%M%S).sql"
          docker exec odoo17_db pg_dump -U odoo postgres > $BACKUP_FILE
          
          if [ $? -eq 0 ]; then
              BACKUP_SIZE=$(du -h $BACKUP_FILE | cut -f1)
              echo "✅ Backup successful: $BACKUP_SIZE"
              echo "BACKUP_SIZE=$BACKUP_SIZE" >> deploy_info.txt
          else
              echo "❌ Backup failed! Aborting deployment."
              exit 1
          fi
          
          # 2. PULL CODE
          echo "🔄 Pulling latest code..."
          git pull origin main
          
          # 3. RESTART CONTAINERS
          echo "🔄 Restarting containers..."
          docker-compose down
          docker-compose up -d
          
          # 4. WAIT
          echo "⏳ Waiting for Odoo to start..."
          sleep 15
          
          # 5. CHECK DATABASE CONNECTION
          echo "🔍 Checking database connection..."
          docker exec odoo17_db psql -U odoo -d postgres -c "SELECT 1;" > /dev/null 2>&1
          
          if [ $? -eq 0 ]; then
              echo "✅ Database connection OK"
          else
              echo "❌ Database connection failed!"
              exit 1
          fi
          
          # 6. CHECK DATA INTEGRITY
          echo "🔍 Checking data integrity..."
          USER_COUNT=$(docker exec odoo17_db psql -U odoo -d postgres -t -c "SELECT COUNT(*) FROM res_users;" | xargs)
          echo "👥 Total users: $USER_COUNT"
          echo "USER_COUNT=$USER_COUNT" >> deploy_info.txt
          
          if [ "$USER_COUNT" -lt 1 ]; then
              echo "❌ Data integrity check failed!"
              exit 1
          fi
          
          # 7. UPDATE MODULES
          echo "🔄 Updating Odoo modules..."
          docker exec odoo17_app odoo -u all -d postgres --stop-after-init || true
          docker-compose restart odoo
          
          # 8. HEALTH CHECK
          echo "🏥 Health check..."
          sleep 10
          HEALTH_CHECK=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80)
          
          if [ "$HEALTH_CHECK" == "200" ] || [ "$HEALTH_CHECK" == "303" ]; then
              echo "✅ Health check passed (HTTP $HEALTH_CHECK)"
          else
              echo "❌ Health check failed (HTTP $HEALTH_CHECK)"
              exit 1
          fi
          
          # 9. GET DATABASE SIZE
          DB_SIZE=$(docker exec odoo17_db psql -U odoo -d postgres -t -c "SELECT pg_size_pretty(pg_database_size('postgres'));" | xargs)
          echo "💾 Database size: $DB_SIZE"
          echo "DB_SIZE=$DB_SIZE" >> deploy_info.txt
          
          # 10. CLEANUP OLD BACKUPS
          echo "🧹 Cleaning old backups..."
          cd backup
          ls -t backup_*.sql 2>/dev/null | tail -n +8 | xargs -r rm
          BACKUP_COUNT=$(ls -1 backup_*.sql 2>/dev/null | wc -l)
          echo "✅ Kept $BACKUP_COUNT recent backups"
          cd ..
          echo "BACKUP_COUNT=$BACKUP_COUNT" >> deploy_info.txt
          
          echo ""
          echo "========================================="
          echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY!"
          echo "========================================="

    - name: Get deployment info
      id: info
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /opt/odoo17
          cat deploy_info.txt

    - name: Parse deployment info
      id: parse
      run: |
        INFO="${{ steps.info.outputs.stdout }}"
        echo "Raw info: $INFO"
        
        BACKUP_SIZE=$(echo "$INFO" | grep "BACKUP_SIZE=" | cut -d'=' -f2)
        USER_COUNT=$(echo "$INFO" | grep "USER_COUNT=" | cut -d'=' -f2)
        DB_SIZE=$(echo "$INFO" | grep "DB_SIZE=" | cut -d'=' -f2)
        BACKUP_COUNT=$(echo "$INFO" | grep "BACKUP_COUNT=" | cut -d'=' -f2)
        
        echo "backup_size=$BACKUP_SIZE" >> $GITHUB_OUTPUT
        echo "user_count=$USER_COUNT" >> $GITHUB_OUTPUT
        echo "db_size=$DB_SIZE" >> $GITHUB_OUTPUT
        echo "backup_count=$BACKUP_COUNT" >> $GITHUB_OUTPUT

    - name: Send success notification
      if: success()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          ✅ Odoo 17 Deployment SUCCESS
          
          📦 Repository: ${{ github.repository }}
          👤 Author: ${{ github.actor }}
          📝 Commit: ${{ github.event.head_commit.message }}
          🌿 Branch: ${{ github.ref_name }}
          
          📊 Deployment Info:
          💾 Database Size: ${{ steps.parse.outputs.db_size }}
          👥 Total Users: ${{ steps.parse.outputs.user_count }}
          📦 Backup Size: ${{ steps.parse.outputs.backup_size }}
          🗃️ Backups Kept: ${{ steps.parse.outputs.backup_count }}
          
          🌐 Server: http://180.93.35.201
          
          ⏱️ Deployed at: ${{ github.event.head_commit.timestamp }}

    - name: Send failure notification
      if: failure()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          ❌ Odoo 17 Deployment FAILED
          
          📦 Repository: ${{ github.repository }}
          👤 Author: ${{ github.actor }}
          📝 Commit: ${{ github.event.head_commit.message }}
          🌿 Branch: ${{ github.ref_name }}
          
          ⚠️ Action Required:
          Check logs: https://github.com/${{ github.repository }}/actions
          
          💡 Quick Rollback:
          git revert HEAD
          git push origin main

    - name: Cleanup temp files
      if: always()
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /opt/odoo17
          rm -f deploy_info.txt
